name: Dependency submission and security vulnerabilities

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: security-code-scanning-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write          # dependency submission API
  security-events: write   # Code Scanning SARIF upload

jobs:
  submit-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target project
        uses: actions/checkout@v6
        with:
          path: project

      - name: Checkout cabal-plan-submit
        uses: actions/checkout@v6
        with:
          repository: dancewithheart/cabal-plan-submit
          path: cabal-plan-submit

      - name: Checkout cabal-audit
        uses: actions/checkout@v6
        with:
          repository: dancewithheart/cabal-audit
          ref: sarif-github-code-scanning
          path: cabal-audit
             
      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.7"
          cabal-version: "3.14"

      - name: Cache Cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
            cabal-plan-submit/dist-newstyle
            cabal-audit/dist-newstyle
            project/dist-newstyle
          key: ${{ runner.os }}-ghc-9.6.7-cabal-3.14-${{ hashFiles('project/**/*.cabal', 'project/cabal.project*', 'cabal-plan-submit/**/*.cabal', 'cabal-plan-submit/cabal.project*', 'cabal-audit/**/*.cabal', 'cabal-audit/cabal.project*') }}
          restore-keys: |
            ${{ runner.os }}-ghc-9.6.7-cabal-3.14-

      - name: Build target project
        working-directory: project
        run: cabal build all

      - name: Build cabal-plan-submit
        working-directory: cabal-plan-submit
        run: cabal build exe:cabal-plan-submit

      - name: Build cabal-audit
        working-directory: cabal-audit
        run: cabal build exe:cabal-audit

      - name: Download deprecated Hackage metadata
        run: |
          curl -L \
            https://raw.githubusercontent.com/commercialhaskell/all-cabal-metadata/master/deprecated.yaml \
            -o deprecated.yaml

      - name: Render and validate dependency snapshot
        working-directory: project
        env:
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
        run: |
          BIN="$(cd ../cabal-plan-submit && cabal list-bin exe:cabal-plan-submit | tail -n 1)"
          "$BIN" render-snapshot dist-newstyle/cache/plan.json "$SHA" "$REF" > ../snapshot.json
          "$BIN" validate-snapshot ../snapshot.json

      - name: Submit dependency snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          owner="${REPO%/*}"
          repo="${REPO#*/}"

          response="$(
            curl \
              --fail-with-body \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$owner/$repo/dependency-graph/snapshots" \
              --data-binary @snapshot.json
          )"

          echo "$response" | jq .

          snapshot_id="$(echo "$response" | jq -r '.id')"
          snapshot_url="https://api.github.com/repos/$owner/$repo/dependency-graph/snapshots/$snapshot_id"

          echo "Snapshot API URL: $snapshot_url"
          echo "Snapshot result: $(echo "$response" | jq -r '.result')"
          echo "Snapshot message: $(echo "$response" | jq -r '.message')"

      - name: Run cabal-audit SARIF
        working-directory: project
        run: |
          CABAL_AUDIT="$(cd ../cabal-audit && cabal list-bin exe:cabal-audit | tail -n 1)"
          "$CABAL_AUDIT" --sarif > ../cabal-audit.sarif

      - name: Enrich cabal-audit SARIF with Cabal dependency paths
        working-directory: project
        run: |
          BIN="$(cd ../cabal-plan-submit && cabal list-bin exe:cabal-plan-submit | tail -n 1)"
          "$BIN" enrich-sarif \
            dist-newstyle/cache/plan.json \
            ../cabal-audit.sarif \
            > ../cabal-audit.enriched.sarif

      - name: Generate deprecated-package SARIF
        working-directory: project
        run: |
          BIN="$(cd ../cabal-plan-submit && cabal list-bin exe:cabal-plan-submit | tail -n 1)"
          "$BIN" deprecated-sarif \
            --production-only \
            dist-newstyle/cache/plan.json \
            ../deprecated.yaml \
            > ../deprecated-packages.sarif

      - name: Upload enriched cabal-audit SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: cabal-audit.enriched.sarif
          category: cabal-audit-enriched

      - name: Upload deprecated-package SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: deprecated-packages.sarif
          category: hackage-deprecated-packages
